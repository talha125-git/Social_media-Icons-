<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body{
            background: #32c4ed;
        }
        ul {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            margin: 0;
            padding: 0;
            list-style: none;
        }
        ul li {
            position: relative;
            margin: 10px;
        }
        ul li a .fa {
            font-size: 40px;
            color: #262626;
            line-height: 80px;
            transition: 0.5s;
            padding-right: 14px;
        }
        ul li span {
            margin: 0;
            padding: 0;
            position: absolute;
            top: 30px;
            color: #262626;
            letter-spacing: 4px;
            transition: 0.5s;
        }
        ul li a {
            text-decoration: none;
            display: block;
            height: 80px;
            width: 170px;
            text-align: left;
            background: #fff;
            padding-left: 20px;
            transform: rotate(-30deg) skew(35deg) translate(0, 0);
            transition: 0.5s;
            box-shadow: -20px 20px 10px rgba(0, 0, 0, 0.5);
        }
        ul li a:before {
            content: "";
            position: absolute;
            top: 10px;
            left: -20px;
            height: 100%;
            width: 20px;
            background: #b1b1b1;
            transition: 0.5s;
            transform: rotate(0deg) skewY(-40deg);
        }
        ul li a:hover {
            transform: rotate(-30deg) skew(35deg) translate(0, -10px);
        }
        ul li a:hover .fa, ul li a:hover span {
            color: white;
        }
        ul li a.facebook:hover {
            background: blue;
        }
        ul li a.twitter:hover {
            background: black;
        }
        ul li a.google:hover {
            background: red;
        }
        ul li a.instagram:hover {
            background: #E1306C; /* Instagram color */
        }
        ul li a.youtube:hover {
            background: red; /* YouTube color */
        }
    </style>
</head>
<body>
    <ul>
        <li>
          <a href="https://www.facebook.com/" class="facebook">
            <i class="fa fa-facebook" aria-hidden="true"></i>
            <span> - Facebook</span>
          </a>
        </li>
        <li>
          <a href="https://www.twitter.com/" class="twitter">
            <i class="fa fa-twitter" aria-hidden="true"></i>
            <span> - Twitter</span>
          </a>
        </li>
        <li>
          <a href="https://plus.google.com/" class="google">
            <i class="fa fa-google-plus" aria-hidden="true"></i>
            <span> - Google</span>
          </a>
        </li>
        <li>
          <a href="https://www.instagram.com/" class="instagram">
            <i class="fa fa-instagram" aria-hidden="true"></i>
            <span> - Instagram</span>
          </a>
        </li>
        <li>
          <a href="https://www.youtube.com/" class="youtube">
            <i class="fa fa-youtube" aria-hidden="true"></i>
            <span> - YouTube</span>
          </a>
        </li>
    </ul>
</body>
</html>
